os:
  editPreset: "nvim"
gui:
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - "#cba6f7"
      - "bold"
    inactiveBorderColor:
      - "#cdd6f4"
    searchingActiveBorderColor:
      - "#cba6f7"
      - "bold"
    optionsTextColor:
      - "#89b4fa"
    selectedLineBgColor:
      - "#313244"
    cherryPickedCommitBgColor:
      - "#45475a"
    cherryPickedCommitFgColor:
      - "#cba6f7"
    unstagedChangesColor:
      - "#f38ba8"
    defaultFgColor:
      - "#cdd6f4"
git:
  paging:
    colorArg: always
    pager: delta --dark --paging=never
